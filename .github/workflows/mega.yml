name: Update proxy list - mega

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

concurrency:
  group: proxy-commit
  cancel-in-progress: false

jobs:
  update-mega:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Generate proxy lists
        env:
          HTTP_URLS: ${{ secrets.HTTP_URLS }}
          SOCKS4_URLS: ${{ secrets.SOCKS4_URLS }}
          SOCKS5_URLS: ${{ secrets.SOCKS5_URLS }}
          MAX_WORKERS: ${{ vars.MAX_WORKERS }}
          FETCH_PROXY_TIMEOUT: ${{ vars.FETCH_PROXY_TIMEOUT }}
          PROXY_CHECK_TIMEOUT: ${{ vars.PROXY_CHECK_TIMEOUT }}
          PROXY_CHECK_RETRIES: ${{ vars.PROXY_CHECK_RETRIES }}
        run: |
          mkdir -p _output/megabasterd
          python main.py -F '_output/megabasterd/formatted-only.txt' -P 'SOCKS4=*' -P 'SOCKS5=*'
          python main.py 'https://mega.nz/favicon.ico' -F '_output/megabasterd/all.txt' -P 'SOCKS4=*' -P 'SOCKS5=*'

      - name: Verify output files
        run: |
          for f in _output/megabasterd/formatted-only.txt _output/megabasterd/all.txt; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty or missing"
              exit 1
            fi
          done

      - name: Commit to gh-pages
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          mv _output /tmp/proxy-output

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          rm -rf megabasterd
          mv /tmp/proxy-output/megabasterd megabasterd

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'chore: update proxy list'
            git push origin gh-pages
          fi
